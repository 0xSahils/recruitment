services:
  postgres:
    image: postgres:15-alpine
    container_name: recruit_postgres
    environment:
      POSTGRES_USER: recruit
      POSTGRES_PASSWORD: recruit_secret
      POSTGRES_DB: recruitment
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruit -d recruitment"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: recruit_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  pgdata:
  qdrant_storage:
